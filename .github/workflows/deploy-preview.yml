name: Deploy Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build
        run: vp run build

      - name: Compute preview worker name
        id: meta
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          branch_name="$BRANCH_NAME"
          branch_slug=$(printf '%s' "$branch_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')
          branch_slug="${branch_slug:0:24}"
          worker_name="app-pr-${PR_NUMBER}-${branch_slug}"
          worker_name="${worker_name:0:63}"
          worker_name=$(printf '%s' "$worker_name" | sed -E 's/-+$//')
          echo "worker_name=$worker_name" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        id: deploy
        run: |
          set -euo pipefail
          output_file=$(mktemp)
          vp exec wrangler deploy --name "${{ steps.meta.outputs.worker_name }}" 2>&1 | tee "$output_file"

          deploy_url=$(grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' "$output_file" | tail -n 1 || true)
          if [ -z "$deploy_url" ]; then
            echo "Failed to determine workers.dev URL from wrangler output"
            exit 1
          fi

          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deploy_url }}
          PREVIEW_WORKER_NAME: ${{ steps.meta.outputs.worker_name }}
        with:
          script: |
            const marker = '<!-- preview-worker-url -->'
            const previewUrl = process.env.PREVIEW_URL
            const workerName = process.env.PREVIEW_WORKER_NAME

            const body = [
              marker,
              `Preview deployment is ready: ${previewUrl}`,
              `Worker name: \`${workerName}\``,
            ].join('\n\n')

            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.data.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
